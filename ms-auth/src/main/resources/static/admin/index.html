<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control Plane - SaaS Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .admin-card { max-width: 500px; margin: 50px auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-panel { background: #2c3e50; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
    </style>
    <script>
        // Bloqueo inmediato si no hay token o no es Superadmin
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            try {
                // Decodificamos el token para verificar el rol
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.role !== 'SUPERADMIN') {
                    alert("Acceso denegado: Se requiere perfil de Superadmin");
                    window.location.href = '/index.html';
                }
            } catch (e) {
                window.location.href = '/login.html';
            }
        })();
    </script>
</head>
<body>
<div class="container">
    <div class="card admin-card">
        <div class="header-panel text-center">
            <h2>SaaS Control Panel</h2>
            <p class="mb-0">Modo: <strong>SUPERADMIN</strong></p>
        </div>
        <div class="card-body p-4">
            <h5 class="card-title mb-4">Alta de Nuevo Cliente (Tenant)</h5>

            <div class="mb-3">
                <label class="form-label">Nombre de la Empresa</label>
                <input type="text" id="tenantId" class="form-control" placeholder="ej: bar-paco">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña Admin Cliente</label>
                <input type="password" id="dbPassword" class="form-control" placeholder="Clave para el cliente">
            </div>

            <button onclick="registerTenant()" class="btn btn-primary w-100 py-2">Provisionar Base de Datos</button>

            <hr>
            <div id="status" class="mt-3 small text-center"></div>
        </div>
    </div>
</div>

<script>
    async function registerTenant() {
    const tenantIdInput = document.getElementById('tenantId');
    const dbPasswordInput = document.getElementById('dbPassword');
    const status = document.getElementById('status');

    // 1. Limpieza y Normalización
    const rawId = tenantIdInput.value.trim();
    const cleanId = rawId.toLowerCase().replace(/\s+/g, '-');
    const dbPassword = dbPasswordInput.value.trim();

    // 2. Validación rápida en cliente
    if (cleanId.length < 3) {
        status.innerHTML = "<span class='text-warning'>⚠️ El nombre es demasiado corto (mín. 3 caracteres).</span>";
        return;
    }
    if (!dbPassword) {
        status.innerHTML = "<span class='text-warning'>⚠️ La contraseña es obligatoria.</span>";
        return;
    }

    status.innerHTML = `⏳ Procesando alta de <strong>${cleanId}</strong>...`;

    // 3. Recuperar el Token del LocalStorage
    const token = localStorage.getItem('token');
    if (!token) {
        status.innerHTML = "<span class='text-danger'>❌ Error: No se encontró sesión activa. Inicia sesión de nuevo.</span>";
        return;
    }

    // 4. Construcción del Payload
    // Nota: Usamos el puerto 5433 según tu docker-compose
    const tenantPayload = {
        id: cleanId,
        dbPassword: dbPassword,
        dbUsername: "admin",
        dbUrl: `jdbc:postgresql://localhost:5433/db_${cleanId.replace(/-/g, '_')}`
    };

    try {
        const response = await fetch('/api/v1/tenants', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}` // <--- CABECERA CRUCIAL
            },
            body: JSON.stringify(tenantPayload)
        });

        if (response.ok) {
            status.innerHTML = `<span class='text-success'>✅ Empresa <strong>${cleanId}</strong> creada correctamente.</span>`;
            tenantIdInput.value = "";
            dbPasswordInput.value = "";
        } else {
            // Manejo detallado de errores según el Status Code
            const errorData = await response.json().catch(() => ({}));
            console.error("Error detallado del servidor:", errorData);

            let errorMsg = errorData.message || "Error en el alta";

            if (response.status === 403) {
                errorMsg = "No tienes permisos de Superadmin o el token ha expirado.";
            } else if (response.status === 500) {
                errorMsg = "Error interno (¿Postgres está corriendo en el 5433? ¿Permisos CREATEDB?)";
            }

            status.innerHTML = `<span class='text-danger'>❌ ${errorMsg}</span>`;
        }
    } catch (error) {
        console.error("Error crítico en la petición:", error);
        status.innerHTML = "<span class='text-danger'>❌ Error crítico de conexión con el servidor.</span>";
    }
}
</script>
</body>
</html>
