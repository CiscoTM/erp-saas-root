server:
  port: 8083

spring:
  application:
    name: ms-operations
  datasource:
    url: jdbc:postgresql://localhost:5433/erp_central?ApplicationName=CentralPool-MS-OPERATIONS
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
      idle-timeout: 30000
      connection-timeout: 30000

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      ddl-auto: none
    properties:
      hibernate:
        multiTenancy: DATABASE

  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1.0.0

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}

app:
  tenant:
    datasource:
      base-url: jdbc:postgresql://localhost:5433/
      username: ${DB_USER:admin}
      password: ${DB_PASSWORD:admin_password}
    flyway:
      locations: classpath:db/migration/operations
  kafka:
    topics:
      recipe-events: "kitchen.recipe.events"
      dish-events: "kitchen.dishes.sync"
      booking-events: "sales.booking.events"
      menu-templates-sync: "kitchen.menu-templates.sync"
      parameter-event: "operations.config.events"
    groups:
      recipe-sync: "kafka-group.operations.recipe-sync"
      dish-sync: "kafka-group.operations.dish-sync"
      booking-processor: "kafka-group.operations.booking-management"
      operations-template-group: "kafka-group.operations.menu-template-sync"