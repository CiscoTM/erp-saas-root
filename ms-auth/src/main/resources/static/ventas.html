<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Ventas - Reservas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4 bg-light">
<div class="container">
    <div class="row">
        <div class="col-md-4">
            <h3>📝 Nueva Reserva</h3>
            <form id="reservaForm" class="card p-3 shadow-sm">
                <div class="mb-3">
                    <label>Título del Evento:</label>
                    <input type="text" id="title" class="form-control" placeholder="Ej: Boda de Juan" required>
                </div>
                <div class="mb-3">
                    <label>Cliente:</label>
                    <input type="text" id="customer" class="form-control" placeholder="Nombre completo" required>
                </div>
                <div class="mb-3">
                    <label>Sala:</label>
                    <select id="roomId" class="form-select" required></select>
                </div>
                <div class="mb-3">
                    <label>Inicio:</label>
                    <input type="datetime-local" id="startDate" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Fin:</label>
                    <input type="datetime-local" id="endDate" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Crear Presupuesto</button>
            </form>
        </div>

        <div class="col-md-8">
            <h3>📅 Calendario de Eventos</h3>
            <div id="errorBox" class="alert alert-danger d-none"></div>
            <div class="card shadow-sm">
                <table class="table mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Evento</th>
                        <th>Sala</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                    </thead>
                    <tbody id="calendarTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const tenant = localStorage.getItem('tenantId');

    async function apiFetch(url, method = 'GET', body = null) {
        const options = {
            method,
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                'X-Tenant-ID': tenant
            }
        };
        if (body) options.body = JSON.stringify(body);
        const resp = await fetch(url, options);
        const data = await resp.json();
        if (!resp.ok) {
            showError(data.message);
            throw new Error(data.message);
        }
        return data;
    }

    function showError(msg) {
        const box = document.getElementById('errorBox');
        box.innerText = msg;
        box.classList.remove('d-none');
        setTimeout(() => box.classList.add('d-none'), 5000);
    }

    async function loadRooms() {
        const rooms = await apiFetch('/api/v1/sales/rooms');
        document.getElementById('roomId').innerHTML = rooms.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    }

    async function loadCalendar() {
        const data = await apiFetch('/api/v1/sales/bookings/calendar?start=2026-01-01T00:00:00&end=2026-12-31T23:59:59');
        document.getElementById('calendarTable').innerHTML = data.map(b => `
            <tr>
                <td>${b.eventName}</td>
                <td>${b.roomName}</td>
                <td><span class="badge ${b.status === 'CONFIRMED' ? 'bg-success' : 'bg-warning'}">${b.status}</span></td>
                <td>
                    ${b.status === 'BUDGET' ? `<button onclick="confirmar(${b.id})" class="btn btn-sm btn-primary">Confirmar</button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    async function confirmar(id) {
        try {
            await apiFetch(`/api/v1/sales/bookings/${id}/confirm`, 'PATCH');
            loadCalendar();
        } catch(e){}
    }

    document.getElementById('reservaForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            eventName: document.getElementById('title').value,
            customerName: document.getElementById('customer').value,
            room: { id: document.getElementById('roomId').value },
            startDate: document.getElementById('startDate').value,
            endDate: document.getElementById('endDate').value
        };
        await apiFetch('/api/v1/sales/bookings', 'POST', payload);
        loadCalendar();
    };

    loadRooms();
    loadCalendar();
</script>
</body>
</html>
